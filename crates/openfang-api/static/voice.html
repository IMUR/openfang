<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>OpenFang Voice</title>
<style>
  :root { --bg: #0a0a0a; --fg: #e0e0e0; --accent: #4a9eff; --muted: #666; --surface: #1a1a1a; --danger: #ff4444; --success: #44ff88; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--fg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  .header { padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #222; }
  .header h1 { font-size: 16px; font-weight: 600; flex: 1; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .status-dot.connected { background: var(--success); }
  .status-dot.speaking { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .config { padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .config select, .config input { background: var(--surface); color: var(--fg); border: 1px solid #333; border-radius: 6px; padding: 6px 10px; font-size: 14px; }
  .config select { flex: 1; min-width: 120px; }
  .config input { width: 100px; }

  .transcript { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 8px 12px; border-radius: 10px; max-width: 85%; font-size: 14px; line-height: 1.4; word-break: break-word; }
  .msg.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
  .msg.assistant { background: var(--surface); align-self: flex-start; border-bottom-left-radius: 2px; }
  .msg.system { background: transparent; color: var(--muted); font-size: 12px; align-self: center; font-style: italic; }

  .controls { padding: 16px; display: flex; justify-content: center; gap: 16px; border-top: 1px solid #222; }
  .btn { width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, background 0.15s; }
  .btn:active { transform: scale(0.9); }
  .btn svg { width: 28px; height: 28px; fill: #fff; }

  .btn-call { background: var(--success); }
  .btn-call.active { background: var(--danger); }
  .btn-mic { background: var(--surface); border: 2px solid #333; }
  .btn-mic.muted { background: var(--danger); }
  .btn-mic.muted svg { opacity: 0.5; }

  .status-bar { padding: 6px 16px; font-size: 11px; color: var(--muted); text-align: center; border-top: 1px solid #222; }
</style>
</head>
<body>

<div class="header">
  <div class="status-dot" id="statusDot"></div>
  <h1>OpenFang Voice</h1>
  <span id="stateLabel" style="font-size:12px; color:var(--muted);">disconnected</span>
</div>

<div class="config" id="configBar">
  <select id="agentSelect"><option value="">Loading agents...</option></select>
  <input id="tokenInput" type="password" placeholder="API token" />
</div>

<div class="transcript" id="transcript"></div>

<div class="controls">
  <button class="btn btn-mic" id="muteBtn" title="Mute" style="display:none;">
    <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm-1-9a1 1 0 012 0v6a1 1 0 01-2 0V5zm6 6a5 5 0 01-10 0H5a7 7 0 0014 0h-2zm-5 9v-2h-1v2H8v2h8v-2h-3z"/></svg>
  </button>
  <button class="btn btn-call" id="callBtn" title="Call">
    <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24 11.36 11.36 0 003.58.57 1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1 11.36 11.36 0 00.57 3.58 1 1 0 01-.24 1.01l-2.21 2.2z"/></svg>
  </button>
</div>

<div class="status-bar" id="statusBar">Select an agent and enter your API token</div>

<script>
(function() {
  // --- Config ---
  const SAMPLE_RATE = 16000;
  const FRAME_MS = 20;
  const FRAME_SAMPLES = SAMPLE_RATE * FRAME_MS / 1000; // 320

  // --- DOM ---
  const agentSel   = document.getElementById('agentSelect');
  const tokenInput = document.getElementById('tokenInput');
  const callBtn    = document.getElementById('callBtn');
  const muteBtn    = document.getElementById('muteBtn');
  const transcript = document.getElementById('transcript');
  const statusDot  = document.getElementById('statusDot');
  const stateLabel = document.getElementById('stateLabel');
  const statusBar  = document.getElementById('statusBar');
  const configBar  = document.getElementById('configBar');

  // --- State ---
  let ws = null;
  let audioCtx = null;
  let mediaStream = null;
  let processorNode = null;
  let connected = false;
  let muted = false;
  let currentText = '';

  // --- Helpers ---
  function baseUrl() {
    return window.location.origin;
  }

  function wsUrl(agentId, token) {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    return proto + '//' + location.host + '/api/agents/' + agentId + '/ws?token=' + encodeURIComponent(token);
  }

  function setState(label) {
    stateLabel.textContent = label;
    statusDot.className = 'status-dot' + (connected ? (label === 'speaking' ? ' speaking' : ' connected') : '');
  }

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    transcript.appendChild(div);
    transcript.scrollTop = transcript.scrollHeight;
    return div;
  }

  function status(msg) { statusBar.textContent = msg; }

  // --- Load agents ---
  async function loadAgents() {
    try {
      const resp = await fetch(baseUrl() + '/api/agents');
      const agents = await resp.json();
      agentSel.innerHTML = '';
      if (!agents.length) {
        agentSel.innerHTML = '<option value="">No agents found</option>';
        return;
      }
      agents.forEach(function(a) {
        const opt = document.createElement('option');
        opt.value = a.id;
        opt.textContent = a.name || a.id;
        agentSel.appendChild(opt);
      });
    } catch(e) {
      agentSel.innerHTML = '<option value="">Failed to load agents</option>';
    }
  }

  // --- Audio capture ---
  async function startCapture() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });

    // On iOS Safari, AudioContext may start suspended
    if (audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }

    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });

    const source = audioCtx.createMediaStreamSource(mediaStream);

    // ScriptProcessorNode (deprecated but universally supported including iOS Safari)
    processorNode = audioCtx.createScriptProcessor(FRAME_SAMPLES, 1, 1);
    processorNode.onaudioprocess = function(e) {
      if (!connected || muted) return;
      const float32 = e.inputBuffer.getChannelData(0);
      // Convert float32 [-1,1] to int16 PCM
      const pcm = new Int16Array(float32.length);
      for (var i = 0; i < float32.length; i++) {
        var s = Math.max(-1, Math.min(1, float32[i]));
        pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      // Send as binary: [0x01] + PCM16 LE bytes
      var frame = new Uint8Array(1 + pcm.byteLength);
      frame[0] = 0x01;
      frame.set(new Uint8Array(pcm.buffer), 1);
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(frame.buffer);
      }
    };

    source.connect(processorNode);
    processorNode.connect(audioCtx.destination); // required for onaudioprocess to fire
  }

  function stopCapture() {
    if (processorNode) { processorNode.disconnect(); processorNode = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(function(t) { t.stop(); }); mediaStream = null; }
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
  }

  // --- Audio playback ---
  let playQueue = [];
  let playing = false;

  function queuePlayback(pcmInt16) {
    playQueue.push(pcmInt16);
    if (!playing) drainPlayQueue();
  }

  function drainPlayQueue() {
    if (!playQueue.length || !audioCtx) { playing = false; return; }
    playing = true;
    var pcm = playQueue.shift();
    var float32 = new Float32Array(pcm.length);
    for (var i = 0; i < pcm.length; i++) {
      float32[i] = pcm[i] / 32768.0;
    }
    var buf = audioCtx.createBuffer(1, float32.length, SAMPLE_RATE);
    buf.getChannelData(0).set(float32);
    var src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.onended = drainPlayQueue;
    src.start();
  }

  // --- WebSocket ---
  function connect() {
    var agentId = agentSel.value;
    var token = tokenInput.value.trim();
    if (!agentId) { status('Select an agent'); return; }
    if (!token) { status('Enter API token'); return; }

    status('Connecting...');
    ws = new WebSocket(wsUrl(agentId, token));
    ws.binaryType = 'arraybuffer';

    ws.onopen = async function() {
      connected = true;
      setState('connected');
      configBar.style.display = 'none';
      muteBtn.style.display = '';
      callBtn.classList.add('active');
      status('Connected — speak to begin');
      addMsg('system', 'Connected to ' + agentSel.options[agentSel.selectedIndex].text);

      try {
        await startCapture();
      } catch(e) {
        status('Microphone error: ' + e.message);
        disconnect();
        return;
      }

      // Send SessionInit (PCM16 mode)
      var init = JSON.stringify({ sample_rate: SAMPLE_RATE, codec: 'pcm16', channels: 1 });
      var initBytes = new TextEncoder().encode(init);
      var frame = new Uint8Array(1 + initBytes.length);
      frame[0] = 0x20;
      frame.set(initBytes, 1);
      ws.send(frame.buffer);
    };

    ws.onmessage = function(event) {
      if (typeof event.data === 'string') {
        // JSON text message
        try {
          var msg = JSON.parse(event.data);
          handleJsonMessage(msg);
        } catch(e) {}
        return;
      }

      // Binary frame
      var data = new Uint8Array(event.data);
      if (data.length < 1) return;
      var type = data[0];
      var payload = data.slice(1);

      switch (type) {
        case 0x02: // AudioDataOut — PCM16 LE
          var pcm = new Int16Array(payload.buffer, payload.byteOffset, payload.byteLength / 2);
          queuePlayback(pcm);
          break;
        case 0x10: // SpeechStart
          setState('speaking');
          currentText = '';
          break;
        case 0x11: // SpeechEnd
          setState('connected');
          if (currentText.trim()) {
            addMsg('assistant', currentText.trim());
            currentText = '';
          }
          break;
        case 0x40: // Interrupt confirmation from server (barge-in acknowledged)
          setState('connected');
          playQueue = [];
          playing = false;
          break;
        case 0x21: // SessionAck
          try {
            var ack = JSON.parse(new TextDecoder().decode(payload));
            addMsg('system', 'Voice session: ' + ack.session_id.slice(0, 8) + '...');
          } catch(e) {}
          break;
        case 0x30: // VadSpeechStart
          addMsg('system', 'Listening...');
          // Barge-in: if bot is speaking when user starts talking, interrupt
          if (stateLabel.textContent === 'speaking') {
            addMsg('system', 'Interrupting...');
            // Send 0x40 Interrupt to server
            var interruptFrame = new Uint8Array([0x40]);
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(interruptFrame.buffer);
            }
            // Flush client-side audio queue immediately
            playQueue = [];
            playing = false;
            setState('connected');
          }
          break;
        case 0x31: // VadSpeechEnd
          addMsg('system', 'Transcribing...');
          break;
        case 0xF0: // Error
          var errMsg = new TextDecoder().decode(payload);
          addMsg('system', 'Error: ' + errMsg);
          status('Error: ' + errMsg);
          break;
      }
    };

    ws.onclose = function() {
      connected = false;
      stopCapture();
      setState('disconnected');
      callBtn.classList.remove('active');
      muteBtn.style.display = 'none';
      configBar.style.display = '';
      status('Disconnected');
      playQueue = [];
      playing = false;
    };

    ws.onerror = function() {
      status('Connection error');
    };
  }

  function disconnect() {
    if (ws) { ws.close(); ws = null; }
    stopCapture();
    connected = false;
    setState('disconnected');
    callBtn.classList.remove('active');
    muteBtn.style.display = 'none';
    configBar.style.display = '';
    playQueue = [];
    playing = false;
  }

  function handleJsonMessage(msg) {
    switch (msg.type) {
      case 'voice_transcript':
        addMsg('user', msg.content);
        break;
      case 'text_delta':
        currentText += msg.content;
        break;
      case 'voice_status':
        addMsg('system', msg.text);
        break;
      case 'error':
        addMsg('system', 'Error: ' + msg.content);
        break;
    }
  }

  // --- Button handlers ---
  callBtn.addEventListener('click', function() {
    if (connected) { disconnect(); } else { connect(); }
  });

  muteBtn.addEventListener('click', function() {
    muted = !muted;
    muteBtn.classList.toggle('muted', muted);
    addMsg('system', muted ? 'Muted' : 'Unmuted');
  });

  // Persist token in sessionStorage
  tokenInput.value = sessionStorage.getItem('vox_token') || '';
  tokenInput.addEventListener('change', function() {
    sessionStorage.setItem('vox_token', tokenInput.value);
  });

  // Init
  loadAgents();
})();
</script>
</body>
</html>
