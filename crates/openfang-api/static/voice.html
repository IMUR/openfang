<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>OpenFang Voice</title>
<style>
  :root { --bg: #0a0a0a; --fg: #e0e0e0; --accent: #4a9eff; --muted: #666; --surface: #1a1a1a; --danger: #ff4444; --success: #44ff88; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--fg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  .header { padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #222; }
  .header h1 { font-size: 16px; font-weight: 600; flex: 1; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .status-dot.connected { background: var(--success); }
  .status-dot.speaking { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .config { padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .config select, .config input { background: var(--surface); color: var(--fg); border: 1px solid #333; border-radius: 6px; padding: 6px 10px; font-size: 14px; }
  .config select { flex: 1; min-width: 120px; }
  .config input { width: 100px; }

  .transcript { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 8px 12px; border-radius: 10px; max-width: 85%; font-size: 14px; line-height: 1.4; word-break: break-word; }
  .msg.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
  .msg.assistant { background: var(--surface); align-self: flex-start; border-bottom-left-radius: 2px; }
  .msg.system { background: transparent; color: var(--muted); font-size: 12px; align-self: center; font-style: italic; }

  .controls { padding: 16px; display: flex; justify-content: center; gap: 16px; border-top: 1px solid #222; }
  .btn { width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, background 0.15s; }
  .btn:active { transform: scale(0.9); }
  .btn svg { width: 28px; height: 28px; fill: #fff; }

  .btn-call { background: var(--success); }
  .btn-call.active { background: var(--danger); }
  .btn-mic { background: var(--surface); border: 2px solid #333; }
  .btn-mic.muted { background: var(--danger); }
  .btn-mic.muted svg { opacity: 0.5; }

  .status-bar { padding: 6px 16px; font-size: 11px; color: var(--muted); text-align: center; border-top: 1px solid #222; }
</style>
</head>
<body>

<div class="header">
  <div class="status-dot" id="statusDot"></div>
  <h1>OpenFang Voice</h1>
  <span id="stateLabel" style="font-size:12px; color:var(--muted);">disconnected</span>
</div>

<div class="config" id="configBar">
  <select id="agentSelect"><option value="">Loading agents...</option></select>
  <input id="tokenInput" type="password" placeholder="API token" />
</div>

<div class="transcript" id="transcript"></div>

<div class="controls">
  <button class="btn btn-mic" id="muteBtn" title="Mute" style="display:none;">
    <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm-1-9a1 1 0 012 0v6a1 1 0 01-2 0V5zm6 6a5 5 0 01-10 0H5a7 7 0 0014 0h-2zm-5 9v-2h-1v2H8v2h8v-2h-3z"/></svg>
  </button>
  <button class="btn btn-call" id="callBtn" title="Call">
    <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24 11.36 11.36 0 003.58.57 1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1 11.36 11.36 0 00.57 3.58 1 1 0 01-.24 1.01l-2.21 2.2z"/></svg>
  </button>
</div>

<div class="status-bar" id="statusBar">Select an agent and enter your API token</div>

<script src="/voice-client.js"></script>
<script>
(function() {
  // --- DOM ---
  var agentSel   = document.getElementById('agentSelect');
  var tokenInput = document.getElementById('tokenInput');
  var callBtn    = document.getElementById('callBtn');
  var muteBtn    = document.getElementById('muteBtn');
  var transcriptEl = document.getElementById('transcript');
  var statusDot  = document.getElementById('statusDot');
  var stateLabel = document.getElementById('stateLabel');
  var statusBar  = document.getElementById('statusBar');
  var configBar  = document.getElementById('configBar');

  // --- State ---
  var ws = null;
  var vc = null; // VoiceClient instance
  var connected = false;
  var currentText = '';

  // --- Helpers ---
  function wsUrl(agentId, token) {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    return proto + '//' + location.host + '/api/agents/' + agentId + '/ws?token=' + encodeURIComponent(token);
  }

  function setState(label) {
    stateLabel.textContent = label;
    statusDot.className = 'status-dot' + (connected ? (label === 'speaking' ? ' speaking' : ' connected') : '');
  }

  function addMsg(role, text) {
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    transcriptEl.appendChild(div);
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
  }

  function status(msg) { statusBar.textContent = msg; }

  // --- Load agents ---
  async function loadAgents() {
    try {
      var resp = await fetch(window.location.origin + '/api/agents');
      var agents = await resp.json();
      agentSel.innerHTML = '';
      if (!agents.length) {
        agentSel.innerHTML = '<option value="">No agents found</option>';
        return;
      }
      agents.forEach(function(a) {
        var opt = document.createElement('option');
        opt.value = a.id;
        opt.textContent = a.name || a.id;
        agentSel.appendChild(opt);
      });
    } catch(e) {
      agentSel.innerHTML = '<option value="">Failed to load agents</option>';
    }
  }

  // --- Connect ---
  function connect() {
    var agentId = agentSel.value;
    var token = tokenInput.value.trim();
    if (!agentId) { status('Select an agent'); return; }
    if (!token) { status('Enter API token'); return; }

    status('Connecting...');
    ws = new WebSocket(wsUrl(agentId, token));
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
      connected = true;
      configBar.style.display = 'none';
      muteBtn.style.display = '';
      callBtn.classList.add('active');
      status('Connected — speak to begin');
      addMsg('system', 'Connected to ' + agentSel.options[agentSel.selectedIndex].text);

      // Create VoiceClient with this WS
      vc = new VoiceClient({
        ws: ws,
        bargeInThreshold: 0.008,
        bargeInCooldownMs: 2000,
        onStateChange: function(state) {
          setState(state);
        },
        onSystemMessage: function(msg) {
          addMsg('system', msg);
        },
        onSessionAck: function(ack) {
          addMsg('system', 'Voice session: ' + ack.session_id.slice(0, 8) + '...');
        },
        onError: function(msg) {
          addMsg('system', 'Error: ' + msg);
          status('Error: ' + msg);
        },
      });

      vc.start().catch(function(e) {
        status('Microphone error: ' + e.message);
        disconnect();
      });
    };

    ws.onmessage = function(event) {
      if (typeof event.data === 'string') {
        try {
          var msg = JSON.parse(event.data);
          switch (msg.type) {
            case 'voice_transcript':
              addMsg('user', msg.content);
              break;
            case 'text_delta':
              currentText += msg.content;
              break;
            case 'voice_status':
              addMsg('system', msg.text);
              break;
            case 'response':
              if (currentText.trim()) {
                addMsg('assistant', currentText.trim());
                currentText = '';
              }
              break;
            case 'error':
              addMsg('system', 'Error: ' + msg.content);
              break;
          }
        } catch(e) {}
        return;
      }

      // Binary frame — delegate to VoiceClient
      if (vc) vc.handleBinaryFrame(event.data);
    };

    ws.onclose = function() {
      connected = false;
      if (vc) { vc.stop(); vc = null; }
      setState('disconnected');
      callBtn.classList.remove('active');
      muteBtn.style.display = 'none';
      configBar.style.display = '';
      status('Disconnected');
    };

    ws.onerror = function() { status('Connection error'); };
  }

  function disconnect() {
    if (vc) { vc.stop(); vc = null; }
    if (ws) { ws.close(); ws = null; }
    connected = false;
    setState('disconnected');
    callBtn.classList.remove('active');
    muteBtn.style.display = 'none';
    configBar.style.display = '';
  }

  // --- Button handlers ---
  callBtn.addEventListener('click', function() {
    if (connected) { disconnect(); } else { connect(); }
  });

  muteBtn.addEventListener('click', function() {
    if (vc) {
      if (vc.isMuted()) { vc.unmute(); } else { vc.mute(); }
      muteBtn.classList.toggle('muted', vc.isMuted());
      addMsg('system', vc.isMuted() ? 'Muted' : 'Unmuted');
    }
  });

  // Persist token
  tokenInput.value = sessionStorage.getItem('vox_token') || '';
  tokenInput.addEventListener('change', function() {
    sessionStorage.setItem('vox_token', tokenInput.value);
  });

  loadAgents();
})();
</script>
</body>
</html>
